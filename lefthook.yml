# See: https://lefthook.dev/configuration/

pre-push:
  jobs:
    - name: mise check
      run: mise check

pre-commit:
  jobs:
    - name: mise check
      run: mise check
    - name: dist freshness
      run: |
        if git diff --cached --name-only | grep -q '^src/'; then
          if ! git diff --cached --name-only | grep -q '^dist/index\.js'; then
            printf "src/ is staged but dist/index.js is not. Run 'mise run build' and stage dist/index.js.\n" >&2
            exit 1
          fi
        fi
