name: 'mise upgrade'
description: 'Upgrade a single mise-managed tool and open a pull request'
author: '23prime'

branding:
  icon: 'arrow-up-circle'
  color: 'blue'

inputs:
  token:
    description: 'GitHub token (contents: write and pull-requests: write permissions required)'
    required: true
  tool:
    description: 'Tool name to upgrade (as it appears in mise.toml)'
    required: true
  branch-prefix:
    description: 'Branch name prefix (e.g. "mise-upgrade" → "mise-upgrade/actionlint-1.7.13")'
    required: false
    default: 'mise-upgrade'
  labels:
    description: 'Comma-separated list of labels to add to the PR'
    required: false
    default: ''
  assignees:
    description: 'Comma-separated list of assignees for the PR'
    required: false
    default: ''
  bump:
    description: 'Pass --bump to mise upgrade to update version constraints in mise.toml'
    required: false
    default: 'true'

outputs:
  pr-url:
    description: 'URL of the created or updated pull request'
    value: ${{ steps.run.outputs.pr-url }}
  changed:
    description: '"true" if the tool version changed after the upgrade'
    value: ${{ steps.run.outputs.changed }}

runs:
  using: composite
  steps:
    - name: Install mise
      uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      with:
        install: true
        cache: true
        github_token: ${{ inputs.token }}

    - name: Upgrade tool
      id: run
      shell: bash
      env:
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_TOOL: ${{ inputs.tool }}
        INPUT_BRANCH-PREFIX: ${{ inputs.branch-prefix }}
        INPUT_LABELS: ${{ inputs.labels }}
        INPUT_ASSIGNEES: ${{ inputs.assignees }}
        INPUT_BUMP: ${{ inputs.bump }}
        GITHUB_TOKEN: ${{ inputs.token }}
      run: node "${{ github.action_path }}/dist/index.js"
